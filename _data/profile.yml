short_bio: >-
  <p>
    Hi! My name is Deogyong Kim, a Master's student in Computer Science and Engineering at Yonsei University. I am a graduate researcher at the <a href="https://dli.yonsei.ac.kr/" target="_blank">Data & Language Intelligence Lab</a>, advised by <a href="https://donalee.github.io/" target="_blank">Prof. Dongha Lee</a>.
  </p>
  <p>
    My research interests lie in Natural Language Processing (NLP), Large Language Models (LLMs), and AI Agents, with a particular focus on personalization for individual users. I am passionate about developing human-centered AI systems that can better understand and adapt to diverse user needs and preferences.
  </p>

